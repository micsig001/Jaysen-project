server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: enterprise-task-system

  # DataSource Configuration
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:task_system}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true

# MyBatis Plus Configuration
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.task.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 7200000  # 2 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

# WeWork Configuration
wework:
  corp-id: ${WEWORK_CORP_ID:}
  agent-id: ${WEWORK_AGENT_ID:}
  secret: ${WEWORK_SECRET:}
  message:
    enabled: ${WEWORK_MESSAGE_ENABLED:true}
    retry-times: 3
    timeout-warning-minutes: 60

# Frontend Configuration
app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

# Sensitive Data Desensitization
sensitive-data:
  enabled: ${SENSITIVE_DATA_ENABLED:true}

# Archive Configuration (Milestone 6)
archive:
  enabled: ${ARCHIVE_ENABLED:true}                     # 是否启用归档
  cron: ${ARCHIVE_CRON:0 0 3 1 * ?}                    # 定时任务：每月1号凌晨3点
  batch-size: ${ARCHIVE_BATCH_SIZE:1000}               # 单批处理任务数
  interval-months: ${ARCHIVE_INTERVAL_MONTHS:12}       # 归档时间阈值（月）
  max-runtime-minutes: ${ARCHIVE_MAX_RUNTIME:180}      # 单次归档最长执行时间（防长跑）
  lock-key: "task:archive:lock"                        # Redis 分布式锁 Key
  lock-expire-seconds: 3600                            # 锁过期时间（兜底）

# Storage Configuration
storage:
  type: ${STORAGE_TYPE:local}  # local | minio | aliyun-oss
  local:
    path: ${STORAGE_LOCAL_PATH:./uploads}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:task-files}
  oss:
    endpoint: ${OSS_ENDPOINT:}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket: ${OSS_BUCKET:}

# Logging
logging:
  level:
    root: INFO
    com.task: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
