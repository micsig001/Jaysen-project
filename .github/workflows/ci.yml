name: CI

# 触发条件：push 到 main 或所有 PR
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 取消旧任务
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # 后端编译 + 测试
  # ============================================
  backend:
    name: Backend (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '17' ]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root
          MYSQL_DATABASE: task_system
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ptest_root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        env:
          REDIS_PASSWORD: test_redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli -a test_redis ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven
        run: mvn -B clean verify -DskipITs
        env:
          # 测试环境变量（避免生产密钥泄露）
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: task_system
          DB_USERNAME: root
          DB_PASSWORD: test_root
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: test_redis
          JWT_SECRET: test-jwt-secret-must-be-at-least-32-characters-long

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results-${{ matrix.java }}
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/

  # ============================================
  # 前端构建 + 类型检查
  # ============================================
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Create .env file
        working-directory: frontend
        run: |
          echo "VITE_API_URL=http://localhost:8080" > .env
          echo "VITE_TOKEN_SECRET=test-token-secret-must-be-at-least-32-characters-long" >> .env

      - name: Type check
        working-directory: frontend
        run: npm run type-check 2>&1 || npm run build

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ============================================
  # 安全审计（依赖漏洞扫描）
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
        continue-on-error: false

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs.sarif'
