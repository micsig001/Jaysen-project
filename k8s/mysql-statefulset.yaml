# ============================================================
# MySQL 8.0 StatefulSet + Headless Service
# ------------------------------------------------------------
# 特点：
#   - 1 副本（生产建议外接 RDS / Cloud SQL，本清单用于自建）
#   - 20Gi PVC 持久化数据卷
#   - 密码从 Secret 注入
#   - 健康检查用 mysqladmin ping
#   - 资源限制：memory 1Gi, cpu 1
#
# ⚠️ 注意：
#   1. replicas=1 不要扩，StatefulSet 多副本需配合主从集群方案
#   2. PVC 不会随 StatefulSet 删除而回收，删除 PVC 才会清数据
#   3. 启动后 backend 才会通过 Flyway 自动建表
# ============================================================
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: task-system
  labels:
    app: mysql
spec:
  # Headless service：让 Pod 有稳定 DNS 主机名 mysql-0.mysql-service
  clusterIP: None
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP
  selector:
    app: mysql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: task-system
  labels:
    app: mysql
spec:
  serviceName: mysql-service
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      # 首次启动需较长时间加载数据目录
      terminationGracePeriodSeconds: 60
      # 修复（P0-5）：initContainer 拼装 client.cnf 供后续探针使用
      initContainers:
        - name: render-client-cnf
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cat > /client-cnf/client.cnf <<'EOF'
              [client]
              user=root
              password=$(cat /mysql-secret/.mysql-password)
              EOF
              chmod 0400 /client-cnf/client.cnf
          volumeMounts:
            - name: mysql-client-cnf
              mountPath: /client-cnf
            - name: mysql-secret
              mountPath: /mysql-secret
              readOnly: true
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: task-secret
                  key: DB_PASSWORD
            - name: MYSQL_DATABASE
              value: "task_system"
            # 兼容部分应用的方言设置
            - name: MYSQL_ROOT_HOST
              value: "%"
            # 字符集（与建库脚本一致）
            - name: MYSQL_CHARSET
              value: "utf8mb4"
            - name: MYSQL_COLLATION
              value: "utf8mb4_unicode_ci"
          # 修复（P1-7）：移除 --default-authentication-plugin（MySQL 8.0 已废弃）
          # 用默认 caching_sha2_password + mysql-connector-java 的 allowPublicKeyRetrieval=true
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
          # 修复（P0-5）：探针用 --defaults-file 引用密码文件（密码不进 ps / 不进审计）
          # 存活探针：mysqladmin ping
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  mysqladmin --defaults-file=/etc/mysql-secret/client.cnf ping -h 127.0.0.1
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          # 就绪探针：能登录即视为就绪
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  mysqladmin --defaults-file=/etc/mysql-secret/client.cnf ping -h 127.0.0.1
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # 启动探针：放宽到 10 分钟，给首次初始化足够时间
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  mysqladmin --defaults-file=/etc/mysql-secret/client.cnf ping -h 127.0.0.1
            periodSeconds: 10
            failureThreshold: 30
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-conf
              mountPath: /etc/mysql/conf.d
            # 修复（P0-5）：挂载 initContainer 渲染好的 client.cnf（含密码但不进 ps / 不进审计）
            - name: mysql-client-cnf
              mountPath: /etc/mysql-secret
              readOnly: true
      volumes:
        - name: mysql-conf
          emptyDir: {}
        # 修复（P0-5）：initContainer 用的密码源（render-client-cnf 读 → 写到 mysql-client-cnf）
        - name: mysql-secret
          projected:
            sources:
              - secret:
                  name: task-secret
                  items:
                    - key: DB_PASSWORD
                      path: .mysql-password
            defaultMode: 0400
        # 修复（P0-5）：initContainer 渲染好的 client.cnf（含密码，供 main + 探针用）
        - name: mysql-client-cnf
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
        labels:
          app: mysql
      spec:
        accessModes: ["ReadWriteOnce"]
        # 生产建议用 storageClassName 显式指定
        # 例如：storageClassName: gp3 / ssd
        resources:
          requests:
            storage: 20Gi
