# ============================================================
# Secret: 任务系统敏感配置
# ------------------------------------------------------------
# 用途：存放数据库密码、Redis 密码、JWT 密钥、企业微信 Secret
#
# ⚠️ 重要：本文件所有 value 字段均为占位符 <BASE64_ENCODED>。
#         真实值必须通过下面三种方式之一注入，**不要** 直接
#         提交明文到 Git。
#
#   方式 1（开发 / 测试 - kubectl 直传）：
#     # 先 base64 编码真实值
#     echo -n 'YourStrongDBPassword' | base64
#     # 然后编辑本文件把 <BASE64_ENCODED> 替换成上面的输出
#
#   方式 2（生产推荐 - kubectl create）：
#     kubectl -n task-system create secret generic task-secret \
#       --from-literal=DB_PASSWORD='YourStrongDBPassword' \
#       --from-literal=REDIS_PASSWORD='YourStrongRedisPassword' \
#       --from-literal=JWT_SECRET='$(openssl rand -base64 48)' \
#       --from-literal=WEWORK_SECRET='YourWeWorkAppSecret'
#     # 然后跳过本文件的 apply
#
#   方式 3（生产更推荐 - Sealed Secrets / External Secrets）：
#     # 见 https://github.com/bitnami-labs/sealed-secrets
#     # 在仓库中提交 SealedSecret 资源，由 controller 解密
#     kubeseal --format yaml < secret.yaml > sealed-secret.yaml
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: task-secret
  namespace: task-system
  labels:
    app: task-secret
    app.kubernetes.io/component: secret
  # 注解：禁止在日志中输出（部分工具会读取此注解做脱敏）
  annotations:
    "kubed.appscode.com/skip-resource": ""
type: Opaque
# ------------------------------------------------------------
# stringData 会自动做 base64 编码后存入 etcd，比 data 友好
# 以下所有值都是占位符，**务必替换**
# ------------------------------------------------------------
stringData:
  # MySQL root 密码
  DB_PASSWORD: "<BASE64_ENCODED>"

  # Redis 密码（生产环境强烈建议开启）
  REDIS_PASSWORD: "<BASE64_ENCODED>"

  # JWT 签名密钥，至少 32 字符，推荐 48 字符 base64
  # 生成：openssl rand -base64 48
  JWT_SECRET: "<BASE64_ENCODED>"

  # 企业微信自建应用 Secret
  WEWORK_SECRET: "<BASE64_ENCODED>"
