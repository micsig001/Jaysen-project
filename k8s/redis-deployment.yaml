# ============================================================
# Redis 7 Deployment + ClusterIP Service + PVC
# ------------------------------------------------------------
# 修复（P0-3 / P0-4 / P1-8）：
#   - 启用 PVC 持久化（Pod 重启数据不丢）
#   - 用 Secret 挂密码文件 + redis.conf 引用 requirepass-file，
#     避免密码进命令行（ps 不可见）
#   - readinessProbe 用 REDISCLI_AUTH 环境变量代替 -a
#
# ⚠️ 部署前请确认 redis-data-pvc 资源充足（建议 ≥5Gi）
# ============================================================
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: task-system
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: task-system
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  strategy:
    type: Recreate
    # Redis 是有状态服务，Recreate 避免双写
  template:
    metadata:
      labels:
        app: redis
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          # 修复（P0-4）：用 redis.conf 引用 requirepass-file，
          # 密码从 secret 挂载的文件读，**不进 ps**
          command:
            - redis-server
            - /etc/redis-config/redis.conf
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          # 修复（P1-8）：用 REDISCLI_AUTH 环境变量传递密码（避免 -a 暴露）
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: task-secret
                  key: REDIS_PASSWORD
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: task-secret
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # 存活探针：ping（不传密码，依赖 requirepass-file）
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # 就绪探针：认证后 ping（用 REDISCLI_AUTH 不暴露密码）
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            # 修复（P0-3）：挂载 PVC 持久化
            - name: redis-data
              mountPath: /data
            # 挂载 redis.conf（来自 ConfigMap）
            - name: redis-config
              mountPath: /etc/redis-config
              readOnly: true
            # 挂载密码文件（来自 Secret）
            - name: redis-passwd
              mountPath: /etc/redis-secret
              readOnly: true
      volumes:
        - name: redis-data
          # 修复（P0-3）：从 emptyDir 改为 PVC，Pod 重启数据不丢
          persistentVolumeClaim:
            claimName: redis-data-pvc
        - name: redis-config
          configMap:
            name: redis-config
        - name: redis-passwd
          secret:
            secretName: task-secret
            items:
              - key: REDIS_PASSWORD
                path: redis-passwd
