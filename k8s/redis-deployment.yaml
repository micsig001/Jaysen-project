# ============================================================
# Redis 7 Deployment + ClusterIP Service
# ------------------------------------------------------------
# 特点：
#   - 1 副本（用作缓存 + 幂等性去重，单点够用；如需 HA
#     请改用 Redis Sentinel / Cluster，本清单用于自建）
#   - 密码从 Secret 注入（启用 requirepass）
#   - 健康检查用 redis-cli ping
#   - 资源限制：memory 512Mi, cpu 500m
# ============================================================
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: task-system
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: task-system
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  strategy:
    type: Recreate
    # Redis 是有状态服务，Recreate 避免双写
  template:
    metadata:
      labels:
        app: redis
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          # 启动时如果 requirepass 失败会重启，password 从 secret 注入
          command:
            - /bin/sh
            - -c
            - |
              if [ -n "$REDIS_PASSWORD" ]; then
                exec redis-server --requirepass "$REDIS_PASSWORD" --appendonly yes
              else
                exec redis-server --appendonly yes
              fi
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: task-secret
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # 存活探针：ping
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # 就绪探针：认证后 ping
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  if [ -n "$REDIS_PASSWORD" ]; then
                    redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
                  else
                    redis-cli ping | grep -q PONG
                  fi
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          # 单节点 Pod，重建后数据丢失；如果要持久化请用 PVC
          emptyDir: {}
