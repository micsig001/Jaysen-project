# ============================================================
# Frontend nginx ConfigMap
# ------------------------------------------------------------
# 用途：把 Vue 3 打包后的 dist/ 通过 nginx:alpine 提供静态服务，
#       同时反代 /api/* 到后端 Service。
# ------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: task-system
  labels:
    app: frontend
    app.kubernetes.io/component: nginx-config
data:
  # nginx.conf 主配置（worker 数、超时、gzip 等）
  nginx.conf: |
    worker_processes auto;
    pid /tmp/nginx.pid;
    error_log /var/log/nginx/error.log warn;

    events {
      worker_connections 1024;
    }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;

      # 使用 /tmp 缓存，避免在只读 fs 下启动失败
      client_body_temp_path /tmp/client_body;
      proxy_temp_path       /tmp/proxy;
      fastcgi_temp_path     /tmp/fastcgi;
      uwsgi_temp_path       /tmp/uwsgi;
      scgi_temp_path        /tmp/scgi;

      sendfile        on;
      tcp_nopush      on;
      keepalive_timeout  65;
      server_tokens   off;

      # gzip 压缩
      gzip on;
      gzip_min_length 1k;
      gzip_comp_level 5;
      gzip_types text/plain text/css application/javascript application/json
                 image/svg+xml application/xml font/ttf font/otf;
      gzip_vary on;

      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';
      access_log /var/log/nginx/access.log main;

      include /etc/nginx/conf.d/*.conf;
    }

  # 站点配置：serve 静态 + 反代 /api
  default.conf: |
    server {
      listen       80 default_server;
      server_name  _;

      # P2.6: 安全头（防止 XSS / clickjacking / MIME 嗅探等）
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline';" always;

      root   /usr/share/nginx/html;
      index  index.html index.htm;

      # 静态资源缓存：带 hash 的文件名可设长缓存
      location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|otf)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
      }

      # Vue history 模式：fallback 到 index.html
      location / {
        try_files $uri $uri/ /index.html;
      }

      # 后端 API 反代
      location /api/ {
        proxy_pass         http://backend-service:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # 转发大文件 / 长连接
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
        proxy_buffering         off;
        client_max_body_size   20m;
      }

      # Swagger UI
      location /swagger-ui/ {
        proxy_pass         http://backend-service:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
      }

      # 健康检查端点
      location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
      }
    }
