# ============================================================
# Kustomization: 一键部署入口
# ------------------------------------------------------------
# 使用：
#   kubectl apply -k k8s/
#
# 删除（**会删除 PVC，慎用**）：
#   kubectl delete -k k8s/
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 部署的命名空间
namespace: task-system

# 资源引用顺序：先 namespace / config / secret
# 再 mysql（StatefulSet 需先就绪）→ redis → backend → frontend → ingress
resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - redis-config.yaml
  - redis-pvc.yaml
  - mysql-statefulset.yaml
  - redis-deployment.yaml
  - backend-deployment.yaml
  - frontend-nginx-configmap.yaml
  - frontend-deployment.yaml
  - ingress.yaml

# 通用 label，自动打到所有资源上
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: task-system
      app.kubernetes.io/managed-by: kustomize

# 通用注解
annotations:
  app.kubernetes.io/managed-by: kustomize

# ------------------------------------------------------------
# 镜像覆盖（部署时必须改 ${VERSION}）：
#   方式 1：命令行（CI 推荐）
#     kustomize edit set image \
#       <YOUR_REGISTRY>/task-backend=<YOUR_REGISTRY>/task-backend:v1.2.3 \
#       <YOUR_REGISTRY>/task-frontend=<YOUR_REGISTRY>/task-frontend:v1.2.3
#   方式 2：kubectl set image
#     kubectl -n task-system set image deployment/backend \
#       backend=<YOUR_REGISTRY>/task-backend:v1.2.3
#     kubectl -n task-system set image deployment/frontend \
#       frontend=<YOUR_REGISTRY>/task-frontend:v1.2.3
# ------------------------------------------------------------
images:
  - name: <YOUR_REGISTRY>/task-backend
    newName: <YOUR_REGISTRY>/task-backend
    # ⚠️ 部署时改为具体版本号（例如 v1.2.3），禁止使用 :latest
    newTag: ${VERSION}
  - name: <YOUR_REGISTRY>/task-frontend
    newName: <YOUR_REGISTRY>/task-frontend
    # ⚠️ 部署时改为具体版本号（例如 v1.2.3），禁止使用 :latest
    newTag: ${VERSION}
